name: Daily AI Hotspots

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. 01:00 UTC is 09:00 in Asia/Shanghai.
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      AI_HOTSPOTS_WEBHOOK_URL: ${{ secrets.AI_HOTSPOTS_WEBHOOK_URL }}
      AI_HOTSPOTS_WEBHOOK_CHANNEL: ${{ secrets.AI_HOTSPOTS_WEBHOOK_CHANNEL }}
      AI_HOTSPOTS_WEBHOOK_USERNAME: ${{ secrets.AI_HOTSPOTS_WEBHOOK_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Generate report
        run: python ai_hotspots_daily.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-hotspots-report
          path: ai_hotspots_reports/

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai_hotspots_reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update daily AI hotspots report"
            git push
          fi
